services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    image: postgres
    ports:
      - 5432:5432
    restart: always
    volumes:
      - /chewingood:/var/lib/postgresql/data
  rails:
    build:
      args:
        ADMIN_PASSWORD: ${ADMIN_PASSWORD}
        ADMIN_USER: ${ADMIN_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_DB: ${POSTGRES_DB}
      context: .
    depends_on:
      - postgres
    environment:
      WAIT_HOSTS: postgres:5432
    ports:
      - ${WEBSITE_PORT}:3000
